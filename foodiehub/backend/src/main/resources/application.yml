server:
  port: ${PORT:8080}

spring:
  application:
    name: foodiehub-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:foodiehub}
    username: ${DB_USER:foodiehub}
    password: ${DB_PASSWORD:foodiehub}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app}

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework
